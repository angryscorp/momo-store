apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/angryscorp/momo-store.git
    targetRevision: main
    path: deploy/charts/monitoring-dashboards
    helm:
      releaseName: monitoring-dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
