version: '3'

vars:
  IMAGE: 'momo-store/frontend'
  TAG: '{{.TAG | default "dev"}}'
  API_URL: '{{.API_URL | default "http://localhost:8081"}}'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse HEAD 2>/dev/null || echo unknown
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  default:
    desc: List frontend tasks
    cmds:
      - task --list --taskfile {{.TASKFILE}}
    silent: true

  serve:
    desc: Start Vue dev server
    dir: '{{.TASKFILE_DIR}}'
    env:
      VUE_APP_API_URL: '{{.API_URL}}'
    cmds:
      - npm run serve

  build:
    desc: Build static assets into ./dist
    dir: '{{.TASKFILE_DIR}}'
    env:
      NODE_ENV: production
      VUE_APP_API_URL: '{{.API_URL}}'
    cmds:
      - npm run build

  docker:build:
    desc: Build production Docker image (nginx serving built assets)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - >
        docker build
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT={{.COMMIT}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        --build-arg VUE_APP_API_URL={{.API_URL}}
        -t {{.IMAGE}}:{{.TAG}} .

  docker:run:
    desc: Run production Docker image
    cmds:
      - docker run --rm -p 8080:8080 --name momo-frontend {{.IMAGE}}:{{.TAG}}
