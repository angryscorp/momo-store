name: CI

# Runs on every PR targeting main. Validates that:
#   - Go tests pass
#   - Both Docker images build successfully (no push)
#   - Terraform files are formatted and valid
# Push events are handled by release.yml; we don't double-build here.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: go test
        working-directory: backend
        run: go test -v ./...

  backend-build:
    name: Backend image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  frontend-build:
    name: Frontend image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            VUE_APP_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  terraform-lint:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [bootstrap, infra]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: terraform fmt
        working-directory: terraform/${{ matrix.module }}
        run: terraform fmt -check -diff

      # -backend=false skips the s3 backend setup so we don't need real YC creds in CI just to validate syntax.
      - name: terraform init (no backend)
        working-directory: terraform/${{ matrix.module }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: terraform/${{ matrix.module }}
        run: terraform validate -no-color
