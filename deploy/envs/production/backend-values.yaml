replicaCount: 2

image:
  # Pin to an immutable release commit tag in production.
  # release.yml opens a promotion PR that updates this to release-YYMMDDHHMM-<sha7>.
  # Example: tag: release-2605101230-abc1234
  tag: main
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

serviceMonitor:
  enabled: true
