# Overrides for the upstream argo/argo-cd chart.
# Full reference: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

# Access via `kubectl port-forward svc/argocd-server -n argocd 8080:80` (or `task k8s:argocd:ui`).
server:
  service:
    type: ClusterIP
  # Required when running without TLS in front (port-forward over HTTP).
  extraArgs:
    - --insecure

controller:
  replicas: 2

repoServer:
  replicas: 1

# Disable the optional components we don't use yet.
applicationSet:
  enabled: false
notifications:
  enabled: false
dex:
  enabled: false
