version: '3'

vars:
  CHARTS_DIR: charts
  ENVS_DIR: envs
  ARGOCD_DIR: argocd

  INGRESS_NGINX_VERSION: 4.15.1
  ARGOCD_VERSION: 9.5.13

tasks:
  default:
    desc: List all k8s tasks
    cmds:
      - task --list-all
    silent: true

  # --- Cluster-level addons -------------------------------------------------

  addons:repo:add:
    desc: Add helm repos for cluster addons
    cmds:
      - helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      - helm repo add argo https://argoproj.github.io/argo-helm
      - helm repo update

  addons:ingress:install:
    desc: Install / upgrade ingress-nginx controller
    deps: [addons:repo:add]
    cmds:
      - |
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace \
          --version {{.INGRESS_NGINX_VERSION}} \
          -f {{.ENVS_DIR}}/addons/ingress-nginx-values.yaml \
          --wait --timeout 5m

  # --- ArgoCD --------------------------------------------------------------

  argocd:install:
    desc: Install / upgrade ArgoCD itself (controller, server, repo-server, redis)
    deps: [addons:repo:add]
    cmds:
      - |
        helm upgrade --install argocd argo/argo-cd \
          --namespace argocd --create-namespace \
          --version {{.ARGOCD_VERSION}} \
          -f {{.ARGOCD_DIR}}/bootstrap-values.yaml \
          --wait --timeout 5m

  argocd:bootstrap:
    desc: Apply the root Application (app-of-apps); ArgoCD then manages everything
    cmds:
      - kubectl apply -n argocd -f {{.ARGOCD_DIR}}/apps/root.yaml

  argocd:admin:password:
    desc: Print the initial ArgoCD admin password
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
      - echo

  argocd:ui:
    desc: 'Port-forward ArgoCD UI to http://localhost:8080 (Ctrl+C to stop). Login: admin / `task k8s:argocd:admin:password`'
    cmds:
      # Forward to the http port (server runs with --insecure, no TLS).
      - kubectl port-forward -n argocd svc/argocd-server 8080:80

  # --- Monitoring (kube-prometheus-stack, managed by ArgoCD) ---------------

  monitoring:grafana:password:
    desc: Print the Grafana admin password (random, generated by the chart on first install)
    cmds:
      - kubectl -n monitoring get secret kube-prometheus-stack-grafana -o jsonpath='{.data.admin-password}' | base64 -d
      - echo

  monitoring:grafana:ui:
    desc: 'Port-forward Grafana to http://localhost:3000 (Ctrl+C to stop). Login: admin / `task k8s:monitoring:grafana:password`'
    cmds:
      - kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80

  monitoring:prometheus:ui:
    desc: Port-forward Prometheus UI to http://localhost:9090 (Ctrl+C to stop)
    cmds:
      - kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090

  # --- Namespaces -----------------------------------------------------------

  namespaces:apply:
    desc: Create application namespaces (staging, production)
    cmds:
      - helm upgrade --install namespaces {{.CHARTS_DIR}}/namespaces

  # --- Per-environment deploys ---------------------------------------------
  # Pattern: helm release name = "<env>-<chart>", lives in namespace "<env>".

  staging:deploy:
    desc: Deploy backend, frontend, ingress to staging
    cmds:
      - task: deploy
        vars: {ENV: staging}

  production:deploy:
    desc: Deploy backend, frontend, ingress to production
    cmds:
      - task: deploy
        vars: {ENV: production}

  deploy:
    internal: true
    requires: {vars: [ENV]}
    cmds:
      - |
        helm upgrade --install {{.ENV}}-backend {{.CHARTS_DIR}}/backend \
          --namespace {{.ENV}} \
          -f {{.ENVS_DIR}}/{{.ENV}}/backend-values.yaml \
          --wait --timeout 3m
      - |
        helm upgrade --install {{.ENV}}-frontend {{.CHARTS_DIR}}/frontend \
          --namespace {{.ENV}} \
          -f {{.ENVS_DIR}}/{{.ENV}}/frontend-values.yaml \
          --wait --timeout 3m
      - |
        helm upgrade --install {{.ENV}}-ingress {{.CHARTS_DIR}}/ingress \
          --namespace {{.ENV}} \
          -f {{.ENVS_DIR}}/{{.ENV}}/ingress-values.yaml

  # --- Inspection ----------------------------------------------------------

  status:
    desc: Show all helm releases and key cluster resources
    cmds:
      - helm list -A
      - kubectl get applications.argoproj.io -n argocd 2>/dev/null || true
      - kubectl get svc -n ingress-nginx ingress-nginx-controller
      - kubectl get pods,svc,ingress -n staging
      - kubectl get pods,svc,ingress -n production
      - kubectl get pods -n monitoring 2>/dev/null || true
