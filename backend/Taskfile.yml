version: '3'

vars:
  IMAGE: 'momo-store/backend'
  TAG: '{{.TAG | default "dev"}}'
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse HEAD 2>/dev/null || echo unknown
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  default:
    desc: List backend tasks
    cmds:
      - task --list --taskfile {{.TASKFILE}}
    silent: true

  run:
    desc: Run the API locally (go run)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - go run ./cmd/api

  test:
    desc: Run go tests
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - go test -v ./...

  docker:build:
    desc: Build production Docker image
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - >
        docker build
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT={{.COMMIT}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        -t {{.IMAGE}}:{{.TAG}} .

  docker:run:
    desc: Run production Docker image
    cmds:
      - docker run --rm -p 8081:8081 --name momo-backend {{.IMAGE}}:{{.TAG}}
