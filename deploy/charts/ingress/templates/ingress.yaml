{{- /*
We need two Ingress objects, not one, because nginx.ingress.kubernetes.io/rewrite-target
applies to *all* paths in an Ingress. Putting `/api` (with rewrite) and `/` (without)
in the same Ingress would rewrite asset URLs like `/js/app.js` to an empty string.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version }}
  annotations:
    # Strip the /api prefix before forwarding to the backend.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - {{- with .Values.host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ .Values.backend.pathPrefix }}(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ required "backend.serviceName is required" .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app.kubernetes.io/name: ingress
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - {{- with .Values.host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ .Values.frontend.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ required "frontend.serviceName is required" .Values.frontend.serviceName }}
                port:
                  number: {{ .Values.frontend.servicePort }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.host | quote }}
      secretName: {{ .Release.Name }}-web-tls
  {{- end }}
